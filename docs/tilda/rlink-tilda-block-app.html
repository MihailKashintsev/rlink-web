<div id="rlink-tilda-app-wrap" style="width:100%;max-width:1280px;margin:0 auto;"></div>
<script>
  (function () {
    var appUrl = (window.RLINK_WEB_APP_URL || "").replace(/\/$/, "");
    var manualHeight = Number(window.RLINK_WEB_HEIGHT || 0);
    var minHeight = Number(window.RLINK_WEB_MIN_HEIGHT || 560);
    var maxHeight = Number(window.RLINK_WEB_MAX_HEIGHT || 980);
    var viewportOffset = Number(window.RLINK_WEB_VIEWPORT_OFFSET || 120);
    var wrap = document.getElementById("rlink-tilda-app-wrap");

    if (!appUrl) {
      wrap.innerHTML =
        '<div style="padding:16px;border:1px solid #ddd;border-radius:10px;background:#fff;font-family:Arial,sans-serif;">' +
        "Rlink embed is not configured. Add config block first and set window.RLINK_WEB_APP_URL." +
        "</div>";
      return;
    }

    // On HTTPS pages (Tilda), HTTP iframe URL is blocked by browser (mixed content).
    if (window.location.protocol === "https:" && appUrl.indexOf("http://") === 0) {
      appUrl = "https://" + appUrl.substring("http://".length);
    }

    var iframe = document.createElement("iframe");
    iframe.src = appUrl + "/index.html";
    iframe.style.width = "100%";
    iframe.style.display = "block";
    iframe.style.border = "0";
    iframe.style.borderRadius = "14px";
    iframe.style.background = "#0B0F1A";
    iframe.loading = "lazy";
    iframe.allow = "camera; microphone; geolocation; clipboard-read; clipboard-write";
    wrap.appendChild(iframe);

    var errShown = false;
    function showLoadError(reason) {
      if (errShown) return;
      errShown = true;
      var msg = document.createElement("div");
      msg.style.marginTop = "12px";
      msg.style.padding = "12px 14px";
      msg.style.border = "1px solid #fecaca";
      msg.style.borderRadius = "10px";
      msg.style.background = "#fff1f2";
      msg.style.color = "#9f1239";
      msg.style.fontFamily = "Arial,sans-serif";
      msg.style.fontSize = "13px";
      msg.textContent =
        "Не удалось загрузить Rlink Web (" + reason + "). Проверьте RLINK_WEB_APP_URL и что используется HTTPS.";
      wrap.appendChild(msg);
    }

    var loadTimer = setTimeout(function () {
      showLoadError("timeout");
    }, 15000);
    iframe.addEventListener("load", function () {
      clearTimeout(loadTimer);
    });
    iframe.addEventListener("error", function () {
      clearTimeout(loadTimer);
      showLoadError("iframe error");
    });

    function clamp(v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    }

    function applyAutoHeight() {
      if (manualHeight > 0) {
        iframe.style.height = manualHeight + "px";
        return;
      }
      var vh = window.visualViewport && window.visualViewport.height
        ? window.visualViewport.height
        : window.innerHeight;
      var dynamicHeight = Math.round(vh - viewportOffset);
      iframe.style.height = clamp(dynamicHeight, minHeight, maxHeight) + "px";
    }

    applyAutoHeight();
    window.addEventListener("resize", applyAutoHeight);
    window.addEventListener("orientationchange", applyAutoHeight);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", applyAutoHeight);
    }
  })();
</script>
