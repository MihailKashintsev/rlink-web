<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="rlink">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>rlink</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    function _rlinkHttpBase(relayUrl) {
      const raw = (relayUrl || '').trim();
      if (!raw) return '';
      if (raw.startsWith('wss://')) return raw.replace('wss://', 'https://');
      if (raw.startsWith('ws://')) return raw.replace('ws://', 'http://');
      return raw;
    }

    function _rlinkB64ToU8(base64Url) {
      const s = (base64Url || '').replace(/-/g, '+').replace(/_/g, '/');
      const pad = '='.repeat((4 - (s.length % 4)) % 4);
      const bin = atob(s + pad);
      const out = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
      return out;
    }

    function _rlinkU8ToB64Url(bytes) {
      let bin = '';
      for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
      return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    window.rlinkSyncPushSubscription = async function(relayUrl, publicKey, nick) {
      try {
        if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
        if (!('Notification' in window)) return;
        const relayBase = _rlinkHttpBase(relayUrl);
        const me = (publicKey || '').trim().toLowerCase();
        if (!relayBase || !me) return;

        const keyResp = await fetch(`${relayBase}/push/public_key`, { method: 'GET' });
        if (!keyResp.ok) return;
        const keyJson = await keyResp.json();
        const vapid = (keyJson && keyJson.publicKey) ? String(keyJson.publicKey).trim() : '';
        if (!vapid) return;

        const perm = await Notification.requestPermission();
        if (perm !== 'granted') return;

        const reg = await navigator.serviceWorker.register('push_sw.js');
        let sub = await reg.pushManager.getSubscription();
        if (!sub) {
          sub = await reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: _rlinkB64ToU8(vapid),
          });
        }
        if (!sub) return;
        const p256 = sub.getKey('p256dh');
        const auth = sub.getKey('auth');
        if (!p256 || !auth) return;
        await fetch(`${relayBase}/push/subscribe`, {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            publicKey: me,
            nick: nick || '',
            subscription: {
              endpoint: sub.endpoint,
              keys: {
                p256dh: _rlinkU8ToB64Url(new Uint8Array(p256)),
                auth: _rlinkU8ToB64Url(new Uint8Array(auth)),
              },
            },
          }),
        });
      } catch (_) {}
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
