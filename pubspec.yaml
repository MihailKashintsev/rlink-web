name: rlink
description: Rlink — Bluetooth mesh messenger
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # BLE
  flutter_blue_plus: ^1.32.12

  # Nearby (WiFi Direct fallback)
  nearby_connections: ^4.3.0

  # Cryptography
  cryptography: ^2.7.0

  # Database
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  path: ^1.9.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # State
  flutter_riverpod: ^2.5.1

  # Networking (updates)
  dio: ^5.4.3+1

  # App info
  package_info_plus: ^8.0.2

  # Open APK installer
  open_filex: ^4.4.0

  # Permissions
  permission_handler: ^11.3.1

  # UUID
  uuid: ^4.4.0

  # Fonts
  google_fonts: ^6.2.1

  # Emoji picker (full unicode set)
  emoji_picker_flutter: ^4.4.0

  # Image picking
  image_picker: ^1.1.2

  # Image compression (avatars)
  flutter_image_compress: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
