name: rlink
description: Rlink — Bluetooth mesh messenger
# После смены version: сделайте `flutter build ios --config-only` и при необходимости
# `flutter build macos --config-only`, иначе PackageInfo / Xcode могут тянуть старый номер из Generated.xcconfig.
version: 0.0.7+13

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # BLE
  flutter_blue_plus: ^1.32.12

  # Nearby (WiFi Direct fallback)
  nearby_connections: ^4.3.0

  # Cryptography
  cryptography: ^2.7.0

  # Database
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3  # Windows / Linux desktop
  sqflite_common_ffi_web: ^0.4.2
  # Keep sqlite3 on 2.x: sqflite_common_ffi_web currently ships a 2.x wasm binary.
  sqlite3: 2.4.6
  path_provider: ^2.1.3
  path: ^1.9.0
  characters: ^1.3.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # State
  flutter_riverpod: ^2.5.1

  # Networking (updates)
  dio: ^5.4.3+1
  connectivity_plus: ^6.1.4

  # App info
  package_info_plus: ^8.0.2

  # Open APK installer
  open_filex: ^4.4.0

  # Permissions
  permission_handler: ^11.3.1

  # UUID
  uuid: ^4.4.0

  # Fonts
  google_fonts: ^8.0.2

  # Emoji picker (full unicode set)
  emoji_picker_flutter: ^4.4.0

  # Image picking
  image_picker: ^1.1.2

  # Image compression (avatars)
  flutter_image_compress: ^2.4.0

  # Link launching
  url_launcher: ^6.3.0
  app_links: ^6.3.3

  # Share exported chats
  share_plus: ^10.1.4

  # Optional: encrypted backup file on Google Drive (OAuth in console)
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  googleapis_auth: ^2.3.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

  # Camera (square video recording)
  camera: ^0.11.0+2

  # Video playback (inline video player in chat)
  video_player: ^2.9.1

  # Voice recording
  record: ^6.2.0

  # Audio playback
  audioplayers: ^6.1.0
  audio_session: ^0.1.25

  # Theme / settings persistence
  shared_preferences: ^2.3.2

  # Location (message geotag)
  geolocator: ^13.0.4

  # Gallery save (download received photos)
  gal: ^2.3.0

  # File / document picker
  file_picker: ^8.1.2

  # Video compression (native codec, no FFmpeg)
  video_compress: ^3.1.4

  # WebSocket for relay server
  web_socket_channel: ^3.0.1
  flutter_webrtc: ^1.2.0

  # Local notifications (personal/group/channel, even in background)
  flutter_local_notifications: ^21.0.0

  # Windows: закрытие окна → трей, relay и уведомления продолжают работать
  window_manager: ^0.4.2
  tray_manager: ^0.2.3
  photo_manager: ^3.9.0
  crop_your_image: ^2.0.0
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  web: ^1.1.1
  image: ^4.8.0
  google_maps_flutter: ^2.17.0
  syncfusion_flutter_pdfviewer: ^33.2.4
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/branding/rlink_mark.png
    - assets/branding/rlink_icon_ai.png
    - assets/sticker_packs/default/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/branding/rlink_launcher_source.png"
  macos:
    generate: true
    image_path: "assets/branding/rlink_launcher_source.png"
  windows:
    generate: true
    image_path: "assets/branding/rlink_launcher_source.png"
  linux:
    generate: true
    image_path: "assets/branding/rlink_launcher_source.png"
  image_path: "assets/branding/rlink_launcher_source.png"
  min_sdk_android: 21
